<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="styleSheet" href="style.css">
</head>
<body>
    <div class="temp-box">
        <div class="another-box">
            <h1 id="h1">Temperature Converter</h1><hr>
            
            <label for="Degree" class="result">Degree</label>
            <input id="Degree" class="degree" type="number" placeholder="Enter value">

            <label for="temperature" class="result">Type</label>
            <select name="temperature" id="temperature" class="degree">
                <option value="Celsius">Celsius</option>
                <option value="Fahrenheit">Fahrenheit</option>
            </select>
            
            <input id="result" class="degree" type="text" placeholder="Result:" readonly>
            <button type="button" id="btn">Convert</button>
        </div>
    </div> 
    <script src="script.js"></script>
</body>
</html>
